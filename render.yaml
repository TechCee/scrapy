services:
  # Backend API (Flask)
  - type: web
    name: trustle-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: PORTAL_USERNAME
        sync: false
      - key: PORTAL_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend (Next.js Web Service)
  - type: web
    name: trustle-web
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
