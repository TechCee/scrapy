app = "trustle-web"
primary_region = "jnb"

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://trustle-api.fly.dev"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
